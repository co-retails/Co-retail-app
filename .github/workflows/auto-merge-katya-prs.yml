name: Auto-merge Katya PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-katya-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    if: >
      github.event.pull_request.user.login == 'katyarunnberg' &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for Katya PRs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            for (let attempt = 1; attempt <= 20; attempt++) {
              const { data: repoInfo } = await github.rest.repos.get({ owner, repo });
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number,
              });

              core.info(
                `Attempt ${attempt}: state=${pr.state}, draft=${pr.draft}, mergeable=${pr.mergeable}, auto_merge=${pr.auto_merge !== null}`
              );

              if (pr.state !== "open") {
                core.info("Pull request is no longer open. Nothing to do.");
                return;
              }

              if (pr.draft) {
                core.info("Pull request is still a draft. Waiting for ready_for_review.");
                return;
              }

              if (pr.mergeable === null) {
                await sleep(5000);
                continue;
              }

              if (pr.mergeable === false) {
                core.setFailed("Pull request is not mergeable.");
                return;
              }

              if (pr.auto_merge) {
                core.info("Auto-merge is already enabled.");
                return;
              }

              const mergeMethod =
                repoInfo.allow_merge_commit ? "MERGE" :
                repoInfo.allow_squash_merge ? "SQUASH" :
                repoInfo.allow_rebase_merge ? "REBASE" :
                null;

              if (!mergeMethod) {
                core.setFailed("Repository does not allow any merge methods.");
                return;
              }

              await github.graphql(`
                mutation EnableAutoMerge($pullRequestId: ID!, $mergeMethod: PullRequestMergeMethod!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: $mergeMethod
                  }) {
                    pullRequest {
                      number
                    }
                  }
                }
              `, {
                pullRequestId: pr.node_id,
                mergeMethod,
              });

              core.info(`Auto-merge enabled using ${mergeMethod}.`);
              return;
            }

            core.setFailed("Timed out waiting for GitHub to compute mergeability.");
