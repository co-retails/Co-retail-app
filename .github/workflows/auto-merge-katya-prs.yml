name: Auto-merge Katya PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-katya-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    if: >
      github.event.pull_request.user.login == 'katyarunnberg' &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Merge Katya PR when ready
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            for (let attempt = 1; attempt <= 20; attempt++) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number,
              });

              core.info(
                `Attempt ${attempt}: state=${pr.state}, draft=${pr.draft}, mergeable=${pr.mergeable}`
              );

              if (pr.state !== "open") {
                core.info("Pull request is no longer open. Nothing to do.");
                return;
              }

              if (pr.draft) {
                core.info("Pull request is still a draft. Waiting for ready_for_review.");
                return;
              }

              if (pr.mergeable === null) {
                await sleep(5000);
                continue;
              }

              if (pr.mergeable === false) {
                core.setFailed("Pull request is not mergeable.");
                return;
              }

              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number,
                merge_method: "merge",
              });

              core.info("Pull request merged successfully.");
              return;
            }

            core.setFailed("Timed out waiting for GitHub to compute mergeability.");
