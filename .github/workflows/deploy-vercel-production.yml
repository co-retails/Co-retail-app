name: Trigger Vercel Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "Missing VERCEL_PRODUCTION_DEPLOY_HOOK_URL secret"
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            "$VERCEL_DEPLOY_HOOK_URL"
