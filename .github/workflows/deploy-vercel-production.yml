name: Ensure Vercel Production Trigger

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vercel-production-trigger
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether a trigger commit is needed
        id: gate
        run: |
          head_author_name="$(git log -1 --format=%an)"
          head_author_email="$(git log -1 --format=%ae)"
          head_subject="$(git log -1 --format=%s)"
          head_sha="$(git rev-parse HEAD)"

          echo "HEAD $head_sha"
          echo "author=${head_author_name} <${head_author_email}>"
          echo "subject=${head_subject}"

          if [ "$head_subject" = "chore: trigger vercel production deployment" ]; then
            echo "trigger_commit=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          case "$head_author_email" in
            49699333+profx-hm@users.noreply.github.com|brian.modica@hm.com)
              echo "trigger_commit=false" >>"$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          if [ "$head_author_name" = "profx-hm" ]; then
            echo "trigger_commit=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          echo "trigger_commit=true" >>"$GITHUB_OUTPUT"

      - name: Push empty profx-hm trigger commit
        if: steps.gate.outputs.trigger_commit == 'true'
        run: |
          git config user.name "profx-hm"
          git config user.email "49699333+profx-hm@users.noreply.github.com"
          git commit --allow-empty -m "chore: trigger vercel production deployment"
          git push origin HEAD:main
